<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <link href="https://unpkg.com/mapbox-gl@1.13.0/dist/mapbox-gl.css" rel="stylesheet" />

  <!doctype html>
  <html lang="en">
    <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>Sri Lanka Route Animation</title>
      <link href="https://unpkg.com/mapbox-gl@1.13.0/dist/mapbox-gl.css" rel="stylesheet" />
      <link rel="stylesheet" href="/assets/styles.css" />
    </head>
    <body>
      <div id="map"></div>

      <div id="ui">
        <div id="controls">
          <button id="playBtn">Play</button>
          <button id="restartBtn">Restart</button>
          <button id="followBtn">Follow</button>
          <label>Speed <input id="speed" type="range" min="0.2" max="3" step="0.1" value="1"></label>
          <div id="iconSelect" class="icon-select" title="Choose vehicle">
            <img src="/static/vehicle.svg" data-url="/static/vehicle.svg" class="icon selected" alt="taxi"/>
            <!-- User-provided bus image should be placed at backend/static/bus.png -->
            <img src="/static/bus.png" data-url="/static/bus.png" class="icon" alt="bus"/>
          </div>
        </div>
        <div id="distance">0 KM</div>
      </div>

      <script src="https://unpkg.com/mapbox-gl@1.13.0/dist/mapbox-gl.js"></script>
      <script src="/assets/app.js"></script>
    </body>
  </html>
