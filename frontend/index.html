<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sri Lanka Route Animation</title>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body>
    <div id="map"></div>

    <div id="ui">
      <div id="controls">
        <button id="playBtn">Play</button>
        <button id="restartBtn">Restart</button>
        <button id="followBtn">Follow</button>
        <button id="recordBtn">⏺ Record</button>
        <label>Speed <input id="speed" type="range" min="0.2" max="3" step="0.1" value="1"></label>
        <div id="iconSelect" class="icon-select" title="Choose vehicle">
          <img src="/static/car_top.png" data-url="/static/car_top.png" class="icon selected" alt="car-top"/>
          <img src="/static/vehicle.svg" data-url="/static/vehicle.svg" class="icon" alt="taxi"/>
          <img src="/static/bus.png" data-url="/static/bus.png" class="icon" alt="bus"/>
          <img src="/static/train.svg" data-url="/static/train.svg" class="icon" alt="train-svg"/>
        </div>
      </div>
      <div id="distance">0 KM</div>
    </div>

    <script>
      window.APP_CONFIG = {
        mapId: "{{GOOGLE_MAPS_MAP_ID}}"
      };
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key={{GOOGLE_MAPS_API_KEY}}&v=beta&libraries=marker&map_ids={{GOOGLE_MAPS_MAP_ID}}"></script>
    <script src="/assets/app.js"></script>
  </body>
</html>
