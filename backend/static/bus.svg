<svg xmlns="http://www.w3.org/2000/svg" width="200" height="140" viewBox="0 0 200 140">
  <!-- Red bus - top-down stylized icon based on user image -->
  <defs>
    <linearGradient id="redGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#FF5A5A"/>
      <stop offset="100%" stop-color="#E63946"/>
    </linearGradient>
  </defs>
  <g transform="translate(8,8)">
    <!-- body -->
    <path d="M18 10 h144 q10 0 14 10 v72 q0 14 -12 20 h-148 q-10 -6 -10 -20 v-72 q6 -10 14 -10 z" fill="url(#redGrad)" stroke="#7f0f0f" stroke-width="3"/>

    <!-- windows row -->
    <rect x="34" y="22" width="132" height="28" rx="6" fill="#b73030" opacity="0.0"/>
    <g fill="#1f2d3d" stroke="#0f1720" stroke-width="2">
      <rect x="36" y="24" width="28" height="26" rx="4"/>
      <rect x="72" y="24" width="28" height="26" rx="4"/>
      <rect x="108" y="24" width="28" height="26" rx="4"/>
      <rect x="144" y="24" width="24" height="26" rx="4"/>
    </g>

    <!-- windshield -->
    <polygon points="170,24 188,24 188,70 170,70" fill="#486B88" stroke="#122028" stroke-width="2"/>

    <!-- side details -->
    <rect x="26" y="64" width="144" height="6" rx="3" fill="#b21f1f"/>

    <!-- wheels -->
    <g fill="#222" stroke="#111" stroke-width="2">
      <circle cx="46" cy="106" r="12"/>
      <circle cx="154" cy="106" r="12"/>
    </g>

    <!-- front bumper -->
    <rect x="28" y="78" width="30" height="10" rx="3" fill="#333"/>
    <rect x="142" y="78" width="30" height="10" rx="3" fill="#333"/>
  </g>
</svg>
