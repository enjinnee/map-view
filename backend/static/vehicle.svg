<svg xmlns="http://www.w3.org/2000/svg" width="80" height="120" viewBox="0 0 80 120">
  <!-- Yellow taxi car (top-down view) -->
  <!-- Outer black stroke for outline -->
  <path d="M 20 15 Q 10 15 10 30 L 10 90 Q 10 105 20 105 L 60 105 Q 70 105 70 90 L 70 30 Q 70 15 60 15 L 20 15 Z" fill="#FFD700" stroke="#000" stroke-width="3" stroke-linejoin="round"/>
  
  <!-- Front window (darker blue) -->
  <ellipse cx="40" cy="35" rx="22" ry="16" fill="#1E90FF" stroke="#000" stroke-width="2"/>
  <path d="M 30 35 Q 40 30 50 35" fill="#17B8D4" opacity="0.6"/>
  
  <!-- Rear window (darker blue) -->
  <ellipse cx="40" cy="70" rx="22" ry="18" fill="#1E90FF" stroke="#000" stroke-width="2"/>
  <path d="M 30 70 Q 40 65 50 70" fill="#17B8D4" opacity="0.6"/>
  
  <!-- Side mirrors -->
  <rect x="5" y="45" width="12" height="20" rx="4" fill="#FF8C00" stroke="#000" stroke-width="2"/>
  <rect x="63" y="45" width="12" height="20" rx="4" fill="#FF8C00" stroke="#000" stroke-width="2"/>
  
  <!-- Bottom accent line -->
  <line x1="20" y1="95" x2="32" y2="110" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <line x1="48" y1="110" x2="60" y2="95" stroke="#000" stroke-width="3" stroke-linecap="round"/>
</svg>
